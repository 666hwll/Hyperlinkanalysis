<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Search</title>
    <link rel="stylesheet" href="css/general_css.css">
</head>
<body>
    

    <div id="Top_Bar_and_Title" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; background-color: #f0f0f0;"> 
        <h1> Meta Search: The best way to browse link lists</h1>
        <button id="reset-out">RESET</button>
    </div>
    <div id="main" class="main" style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px; min-height: 100vh;">
    <!--<div id="main" class="main" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">-->
    <div id="search_bar">
        <input
            type="text"
            id="search-input"
            placeholder="Searching through your list"
            aria-label="Suchleiste"
            autocomplete="off"
        >
    <button id="search-button">🔍</button> <br>
    <button id="lucky-button">I am feeling lucky</button>
    </div>
    <br>
    <div id="file_input">
        <label for="myfile">Select a file:</label>
        <input type="file" id="myfile" name="myfile">
    </div>
    <div id="output"></div>
    <br>
   
    </div>


    <script src="scripts/general.js"></script>
</body>
</html>
